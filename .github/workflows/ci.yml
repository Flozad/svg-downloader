name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

  package:
    # The extension must still zip cleanly — a broken manifest or a version
    # mismatch between package.json and manifest.json fails here rather than at
    # Web Store upload time.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build the store zip
        run: bun run package

      - uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: dist/*.zip
          if-no-files-found: error
