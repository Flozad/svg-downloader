name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned, not "latest". A wildcard makes setup-bun resolve tags through
          # the GitHub API, which rate-limits and fails outright during an API
          # incident, and it silently changes the toolchain under CI between runs.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      # Coverage rather than a bare `test` run: vitest.config.js pins per-metric
      # thresholds just under what the suite achieves, so a change that drops
      # coverage fails here instead of shipping an untested branch to the store.
      - name: Test
        run: bun run test:coverage

  motion:
    # motion/ is a separate workspace with its own package.json, so the root
    # lint and test jobs never see it. It has a typecheck script; without a job
    # to run it, ~1k lines of TSX can rot silently between video renders.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: motion

      - name: Typecheck
        run: bun run typecheck
        working-directory: motion

  links:
    # docs/ is 18 hand-written HTML pages with a duplicated nav and footer in
    # each. A broken internal link ships silently and costs crawl budget, and
    # nothing else in CI reads these files at all.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          # Offline: internal links and anchors only. External URLs are someone
          # else's uptime, and failing the build on their outage is noise.
          args: --offline --include-fragments --verbose --no-progress 'docs/**/*.html'
          fail: true

  package:
    # The extension must still zip cleanly — a broken manifest or a version
    # mismatch between package.json and manifest.json fails here rather than at
    # Web Store upload time.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned, not "latest". A wildcard makes setup-bun resolve tags through
          # the GitHub API, which rate-limits and fails outright during an API
          # incident, and it silently changes the toolchain under CI between runs.
          bun-version: 1.3.13

      - name: Build the store zip
        run: bun run package

      - uses: actions/upload-artifact@v7
        with:
          name: extension-zip
          path: dist/*.zip
          if-no-files-found: error
