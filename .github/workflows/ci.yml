name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned, not "latest". A wildcard makes setup-bun resolve tags through
          # the GitHub API, which rate-limits and fails outright during an API
          # incident, and it silently changes the toolchain under CI between runs.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

  package:
    # The extension must still zip cleanly — a broken manifest or a version
    # mismatch between package.json and manifest.json fails here rather than at
    # Web Store upload time.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned, not "latest". A wildcard makes setup-bun resolve tags through
          # the GitHub API, which rate-limits and fails outright during an API
          # incident, and it silently changes the toolchain under CI between runs.
          bun-version: 1.3.13

      - name: Build the store zip
        run: bun run package

      - uses: actions/upload-artifact@v7
        with:
          name: extension-zip
          path: dist/*.zip
          if-no-files-found: error
