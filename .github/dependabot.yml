version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5

  # The Remotion project is independent of the extension and updates noisily;
  # keep it on the same cadence but in its own PRs.
  - package-ecosystem: npm
    directory: /motion
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
