name: Feature request
description: Suggest an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation you're in, not just the feature you want — it often leads to a better solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like it to do?
    validations:
      required: true

  - type: checkboxes
    id: permissions
    attributes:
      label: Permissions
      description: The extension deliberately requests no host permissions, which keeps it privacy-preserving and easy to review.
      options:
        - label: I understand this may not be possible if it would require broader permissions
