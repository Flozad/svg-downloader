<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SVG Downloader &amp; Extractor</title>
  <link href="popup.css" rel="stylesheet">
</head>
<body>
  <!-- Shared vector defs: the product mark and a bare download glyph, drawn once. -->
  <svg width="0" height="0" aria-hidden="true" focusable="false" class="sprite-sheet">
    <defs>
      <g id="mark-art">
        <rect width="48" height="48" rx="10" fill="var(--plot)"/>
        <path d="M24 13v15m0 0l-6.5-6.5M24 28l6.5-6.5" fill="none" stroke="var(--surface-hi)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="16.5" y="33.5" width="15" height="2.4" rx="1.2" fill="var(--surface-hi)"/>
      </g>
      <g id="arrow-art">
        <path d="M24 12v16m0 0l-7-7m7 7l7-7" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="16" y="34" width="16" height="2.6" rx="1.3" fill="currentColor"/>
      </g>
    </defs>
  </svg>

  <div class="panel">
    <!-- ── Header ── -->
    <header class="head">
      <!-- Decorative wordmark, not a link: the popup has nowhere to navigate
           to, and href="#" gave screen readers a link that goes nowhere. -->
      <div class="brand">
        <svg class="mark" viewBox="0 0 48 48" aria-hidden="true"><use href="#mark-art"/></svg>
        <strong>SVG&nbsp;Downloader</strong>
      </div>
      <div class="head-tools">
        <span class="counter" id="counter">0 found</span>
        <button type="button" id="refreshBtn" class="icon-btn" title="Rescan this page" aria-label="Rescan this page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button type="button" id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <circle cx="12" cy="12" r="3" stroke-width="1.8"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9c.14.31.22.65.22 1s-.08.69-.22 1z" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="body">
      <!-- ── Preview mount ── -->
      <figure class="mount">
        <span class="mount-tag" id="mountTag">preview</span>

        <div id="loading" class="hidden overlay">
          <svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div id="empty-state" class="hidden empty">
          <svg class="empty-glyph" viewBox="0 0 48 48" aria-hidden="true"><use href="#mark-art"/></svg>
          <!-- role="status" because every failure message the user most needs
               — "Cannot access SVGs on this page", "Could not reach this page"
               — is written here. Without a live region they are announced to
               nobody. -->
          <p role="status">No SVGs found on this page</p>
          <button type="button" id="retryBtn" class="btn btn-quiet btn-sm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
              <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Scan page</span>
          </button>
        </div>

        <p id="no-preview" class="loading-label">Loading SVGs&hellip;</p>
        <div id="preview" class="hidden preview"></div>
      </figure>

      <!-- ── Pager ── -->
      <div class="pager">
        <button type="button" id="prevBtn" class="btn btn-quiet">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M15 18l-6-6 6-6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Prev</span>
        </button>
        <span class="pager-pos" id="pagerPos">—</span>
        <button type="button" id="nextBtn" class="btn btn-quiet">
          <span>Next</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M9 6l6 6-6 6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <!-- ── Filename ── -->
      <label class="field">
        <span class="field-key">Filename</span>
        <span class="field-input">
          <input type="text" id="filenameInput" placeholder="star" autocomplete="off" spellcheck="false">
          <span class="field-ext">.svg</span>
        </span>
      </label>

      <!-- ── Actions ── -->
      <div class="actions">
        <button type="button" id="downloadBtn" class="btn btn-primary">
          <svg viewBox="0 0 48 48" aria-hidden="true"><use href="#arrow-art"/></svg>
          <span>Download current</span>
        </button>
        <button type="button" id="downloadAllBtn" class="btn btn-quiet">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4M9 9h6M9 13h6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Download all as ZIP</span>
        </button>
      </div>

      <!-- Non-destructive status line for ZIP outcomes (partial / full success). -->
      <p id="status" class="status hidden" role="status"></p>

      <!-- ── Color hand-off ── -->
      <p class="handoff" id="colorLink">
        Need a different colour?
        <a href="https://app.clasicwebtools.com/tools/image/svg-color-changer" target="_blank" rel="noopener">Open SVG Color Changer</a>
      </p>
    </div>

    <!-- ── Colophon ── -->
    <footer class="foot">
      <a href="https://github.com/Flozad" target="_blank" rel="noopener">GitHub</a>
      <span class="dot">·</span>
      <a href="https://clasicwebtools.com" target="_blank" rel="noopener">clasicwebtools</a>
      <span class="dot">·</span>
      <a href="https://twitter.com/lozards" target="_blank" rel="noopener">Twitter</a>
      <span class="dot">·</span>
      <a href="mailto:clasicwebtools@gmail.com?subject=SVG%20Downloader%20issue" target="_blank" rel="noopener">Report issue</a>
      <span class="grow"></span>
      <span class="sig">on&nbsp;device</span>
    </footer>
  </div>

  <script src="lib/jszip.min.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
